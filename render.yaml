services:
  # ── Backend: Express API ─────────────────────────────────────────────────────
  - type: web
    name: gym-guide-pro-api
    runtime: node
    region: singapore
    plan: free
    rootDir: artifacts/api-server
    buildCommand: corepack enable && cd ../.. && pnpm install --frozen-lockfile && cd artifacts/api-server && pnpm build
    startCommand: node --enable-source-maps ./dist/index.mjs
    healthCheckPath: /api/exercises
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false          # set this manually in the Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: FRONTEND_URL
        fromService:
          name: gym-guide-pro-web
          type: web
          property: host
          prefix: https://

  # ── Frontend: React/Vite SPA ─────────────────────────────────────────────────
  - type: web
    name: gym-guide-pro-web
    runtime: static
    rootDir: artifacts/gym-planner
    buildCommand: corepack enable && cd ../.. && pnpm install --frozen-lockfile && cd artifacts/gym-planner && pnpm build
    staticPublishPath: dist/public
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: gym-guide-pro-api
          type: web
          property: host
          prefix: https://
