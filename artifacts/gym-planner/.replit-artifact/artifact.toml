kind = "web"
previewPath = "/"
title = "GymGuide - Workout Planner"
version = "1.0.0"
id = "artifacts/gym-planner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23346

[services.development]
run = "pnpm --filter @workspace/gym-planner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-planner", "run", "build" ]
publicDir = "artifacts/gym-planner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23346"
BASE_PATH = "/"
